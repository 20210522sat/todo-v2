<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>共享代辦清單</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#9fb5a7;--bg:#f3f0ea;--card:#fffdf9;--card2:#f8f5ef;--text:#24211e;--muted:#776f66;--soft:#a79f95;--line:rgba(60,48,35,.13);--danger:#b96863;--warn:#c79a55;--ok:#7fa88d;--shadow:0 18px 42px rgba(91,76,58,.13)}
@media(prefers-color-scheme:dark){:root{--bg:#181714;--card:#24231f;--card2:#2d2b26;--text:#f5efe7;--muted:#bbb1a5;--soft:#8f867b;--line:rgba(255,255,255,.1);--shadow:0 18px 46px rgba(0,0,0,.3)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:radial-gradient(circle at 10% 0%,color-mix(in srgb,var(--accent) 24%,transparent),transparent 35%),var(--bg);color:var(--text);min-height:100vh;padding:18px 12px 42px}.app{max-width:850px;margin:0 auto}.hero{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:28px;background:linear-gradient(135deg,var(--card),color-mix(in srgb,var(--accent) 13%,var(--card2)));box-shadow:var(--shadow);padding:18px;min-height:135px;margin-bottom:14px}.hero h1{font-size:27px;letter-spacing:-.04em}.sub{font-size:13px;color:var(--muted);line-height:1.45;max-width:530px;margin-top:4px}.bunny{position:absolute;right:14px;bottom:-8px;width:110px;filter:drop-shadow(0 12px 16px rgba(50,35,20,.18));pointer-events:none}.topline{display:flex;gap:8px;align-items:center;margin-top:12px}.dot{width:8px;height:8px;border-radius:99px;background:#ccc}.dot.ok{background:var(--ok)}.dot.loading{background:var(--warn)}.dot.err{background:var(--danger)}.badge{font-size:12px;padding:5px 10px;border-radius:99px;background:var(--card);border:1px solid var(--line);color:var(--muted)}
.panel,.section,.bin{background:color-mix(in srgb,var(--card) 93%,transparent);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}.panel{padding:12px;margin-bottom:14px}.tools{display:grid;grid-template-columns:1fr auto;gap:8px}input,textarea,button{font-family:inherit}.search,input[type=text],input[type=datetime-local],textarea{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:13px;padding:9px 11px;outline:none;font-size:14px}input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}.btn,.fb,.sec-add-btn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:13px;padding:9px 12px;font-size:13px;cursor:pointer}.btn:hover,.fb:hover,.sec-add-btn:hover{background:var(--card2)}.filters,.palette{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}.fb.on{background:var(--accent);border-color:var(--accent);color:white}.palette-label{font-size:12px;color:var(--muted);width:100%;margin-top:4px}.sw{width:27px;height:27px;border-radius:999px;border:2px solid var(--card);box-shadow:0 0 0 1px var(--line);cursor:pointer}.sw.on{box-shadow:0 0 0 2px var(--text)}
.section{overflow:hidden;margin-bottom:14px}.sec-hd,.grp-hd{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}.sec-hd{padding:14px 16px;background:linear-gradient(135deg,var(--card2),var(--card))}.grp-hd{padding:10px 16px;background:color-mix(in srgb,var(--accent) 8%,var(--card2))}.sec-title{flex:1;font-weight:750;font-size:16px}.grp-title{flex:1;font-weight:650;color:var(--muted);font-size:14px}.count{font-size:12px;color:var(--soft);padding:3px 8px;border-radius:99px;background:var(--card);border:1px solid var(--line)}.cv{width:14px;height:14px;transition:.2s;color:var(--soft)}.cv.open{transform:rotate(90deg)}
.todo{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;padding:11px 14px;border-top:1px solid var(--line)}.todo:first-child{border-top:none}.todo.done{opacity:.52}.todo.overdue{background:color-mix(in srgb,var(--danger) 12%,transparent)}.todo.urgent{background:color-mix(in srgb,var(--warn) 13%,transparent)}.todo.notime{background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--soft) 7%,transparent));border-top-style:dashed}.chk{margin-top:2px;width:22px;height:22px;border-radius:999px;border:1.8px solid var(--line);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer}.chk.yes{background:var(--ok);border-color:var(--ok)}.chk svg{width:13px;height:13px;stroke:white;fill:none;stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round}.task-text{font-size:15px;line-height:1.38;word-break:break-word}.done .task-text{text-decoration:line-through;color:var(--soft)}.meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:6px}.chip{font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700;line-height:1.5;white-space:nowrap}.chip.time{background:var(--card2);color:var(--muted)}.chip.none{background:transparent;color:var(--soft);border:1px dashed var(--line)}.chip.soon{background:#f6e7c8;color:#8a5b15}.chip.urgent{background:#ffe1bc;color:#9b4a00}.chip.overdue{background:#f6d2cf;color:#8b2825}.chip.done{background:#dbeadf;color:#376b49}.note{font-size:12px;color:var(--soft);line-height:1.45;margin-top:5px;white-space:pre-wrap}.actions{display:flex;gap:2px}.icon{width:28px;height:28px;border:0;background:transparent;color:var(--soft);border-radius:10px;cursor:pointer}.icon:hover{background:var(--card2);color:var(--text)}.icon.del:hover{color:var(--danger)}
.add-row,.add-grp-row,.new-sec-row,.edit-form{display:flex;gap:7px;flex-wrap:wrap;padding:10px 12px;border-top:1px dashed var(--line);background:color-mix(in srgb,var(--card) 78%,var(--card2))}.add-row input[type=text]{flex:1;min-width:140px}.edit-form{grid-column:1/4;border-top:0;padding:0;margin-top:7px;background:transparent}.edit-form input[type=text]{flex:1;min-width:160px}.edit-form textarea{width:100%;min-height:62px;resize:vertical}.todo.editing .normal,.todo.editing .actions{display:none}.todo:not(.editing) .edit-form{display:none}.save{background:var(--accent)!important;color:white!important;border-color:var(--accent)!important}
.who-wrap{position:relative;display:inline-block}.who-btn{border:1px solid var(--line);background:var(--card);border-radius:13px;padding:9px 10px;color:var(--muted);font-size:13px;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}.who-dropdown{position:absolute;bottom:calc(100% + 6px);left:0;z-index:20;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px;min-width:160px;box-shadow:var(--shadow)}.who-option{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:10px;font-size:13px;cursor:pointer}.who-option:hover{background:var(--card2)}.who-check{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--line)}.who-check.on{background:var(--accent);border-color:var(--accent)}.who-add{display:flex;gap:5px;border-top:1px solid var(--line);padding-top:6px;margin-top:5px}.who-add input{min-width:85px;flex:1;font-size:12px;padding:6px 7px}.who-add button{padding:6px 8px}
.add-grp-btn{display:flex;align-items:center;gap:5px;width:100%;padding:10px 16px;border:0;border-top:1px dashed var(--line);background:transparent;color:var(--soft);text-align:left;cursor:pointer}.add-grp-btn:hover{background:var(--card2);color:var(--muted)}.empty{padding:14px;color:var(--soft);font-size:13px;text-align:center}.bin{overflow:hidden;margin-top:18px}.bin-hd{display:flex;gap:8px;align-items:center;padding:12px 14px;cursor:pointer}.bin-title{flex:1;color:var(--muted);font-size:13px}.bin-item{display:flex;gap:8px;align-items:center;border-top:1px solid var(--line);padding:9px 12px}.bin-text{flex:1;color:var(--soft);font-size:13px;text-decoration:line-through;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px;color:var(--soft)}.spin{width:24px;height:24px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:560px){body{padding:10px 8px 30px}.hero{min-height:150px;padding:16px}.hero h1{font-size:22px}.bunny{width:94px;opacity:.92}.tools{grid-template-columns:1fr}.todo{grid-template-columns:auto 1fr auto;padding:10px}input[type=datetime-local]{width:100%}.who-wrap{flex:1}.who-btn{width:100%;max-width:none}.edit-form{grid-column:1/4}}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1>共享代辦清單</h1>
    <div class="sub">保留原本 Firebase 資料；依時間排序、快到期提醒、負責人彩色標籤，並可切換莫蘭迪色系介面。</div>
    <div class="topline"><span class="dot loading" id="sync-dot"></span><span class="badge" id="top-badge">—</span></div>
    <img class="bunny" src="bunny_idle(1).png" alt="可愛兔兔插圖" />
  </div>
  <div class="panel">
    <div class="tools"><input class="search" id="search-input" placeholder="搜尋任務、備註、負責人..." oninput="setSearch(this.value)"/><button class="sec-add-btn" onclick="showNewSec()">＋ 新增分類</button></div>
    <div class="filters"><button class="fb on" onclick="setFilter('all',this)">全部</button><button class="fb" onclick="setFilter('active',this)">未完成</button><button class="fb" onclick="setFilter('soon',this)">快到期</button><button class="fb" onclick="setFilter('overdue',this)">已逾期</button><button class="fb" onclick="setFilter('notime',this)">未排時間</button><button class="fb" onclick="setFilter('done',this)">已完成</button></div>
    <div class="palette"><div class="palette-label">介面顏色｜莫蘭迪色系</div><div id="palette-wrap"></div></div>
    <div id="new-sec-form" style="display:none" class="new-sec-row"><input type="text" id="new-sec-input" placeholder="分類名稱..." maxlength="30"/><button onclick="confirmNewSec()">確認</button><button onclick="cancelNewSec()">取消</button></div>
  </div>
  <div id="main-wrap"><div class="loading"><div class="spin"></div>連線中…</div></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
const firebaseConfig={apiKey:"AIzaSyBCHC-YeuEnAn-AHmxyqilk-YfZJoYlZr4",authDomain:"todoo-4dabb.firebaseapp.com",databaseURL:"https://todoo-4dabb-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"todoo-4dabb",storageBucket:"todoo-4dabb.firebasestorage.app",messagingSenderId:"1051175196313",appId:"1:1051175196313:web:d2ad472040862f23510a08"};
const db=getDatabase(initializeApp(firebaseConfig));const ROOT=ref(db,'todoapp');
const THEMES=[['sage','#9fb5a7'],['dusty','#b8a7a1'],['rose','#c9a4a5'],['latte','#c6b49a'],['blue','#9aaec4'],['olive','#a8ad8d'],['lavender','#aaa0bf'],['clay','#bd9c8d']];
const NAME_COLORS=['#d8a7a1','#a7bfa8','#a9b8c8','#c8b38f','#b8a7c8','#91b7b1','#c2aaa0','#aeb294','#d0a7b6','#9fb0d0'];
let state=null,filter='all',searchText='',binOpen=false,pickerSel={},openPicker=null,editingId=null,editPickerSel=new Set();
const today=()=>new Date().toISOString().slice(0,10);const addDays=(d,n)=>{const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)};const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));const dateOnly=dt=>dt?String(dt).slice(0,10):'';
function defaultState(){return{nid:20,people:['欣儀','咨妗','所有人'],personColors:{},ui:{theme:'sage'},sections:[{id:1,title:'工作任務',open:true,groups:[{id:2,title:'本週重點',open:true,tasks:[{id:3,text:'準備週會簡報',assignees:['欣儀'],done:false,due:addDays(today(),1)},{id:4,text:'更新專案文件',assignees:['咨妗'],done:false,due:addDays(today(),5)}]},{id:5,title:'長期追蹤',open:true,tasks:[{id:6,text:'回覆客戶信件',assignees:['欣儀','咨妗'],done:true,due:addDays(today(),-1)}]}],tasks:[]},{id:7,title:'生活雜事',open:true,groups:[],tasks:[{id:8,text:'安排下次團隊聚餐',assignees:['所有人'],done:false,due:addDays(today(),10)},{id:9,text:'購買辦公室零食',assignees:['咨妗'],done:false,due:addDays(today(),3)}]}],bin:[]}}
function normalize(){state.bin=state.bin||[];state.people=state.people||['欣儀','咨妗','所有人'];state.personColors=state.personColors||{};state.ui=state.ui||{theme:'sage'};state.people.forEach((p,i)=>{if(!state.personColors[p])state.personColors[p]=NAME_COLORS[i%NAME_COLORS.length]});state.nid=state.nid||Date.now();state.sections=(state.sections||[]).map(s=>({...s,open:s.open!==false,tasks:(s.tasks||[]).map(normTask),groups:(s.groups||[]).map(g=>({...g,open:g.open!==false,tasks:(g.tasks||[]).map(normTask)}))}));}
function normTask(t){const ass=t.assignees||(t.assignee?[t.assignee]:['所有人']);return{...t,assignees:ass,done:!!t.done,dueAt:t.dueAt||dateToDueAt(t.due),note:t.note||''}}function dateToDueAt(d){if(!d)return'';return String(d).length===10?`${d}T09:00`:String(d).slice(0,16)}
function applyTheme(){const t=THEMES.find(x=>x[0]===(state?.ui?.theme||'sage'))||THEMES[0];document.documentElement.style.setProperty('--accent',t[1]);renderPalette()}function renderPalette(){const w=document.getElementById('palette-wrap');if(!w||!state)return;w.innerHTML=THEMES.map(([id,c])=>`<button class="sw ${state.ui.theme===id?'on':''}" style="background:${c}" onclick="setTheme('${id}')" title="${id}"></button>`).join('')}window.setTheme=id=>{state.ui=state.ui||{};state.ui.theme=id;applyTheme();pushState()};
function dot(s){const d=document.getElementById('sync-dot');if(d)d.className='dot '+s}function pushState(){dot('loading');purgeBin();set(ROOT,state).then(()=>dot('ok')).catch(()=>dot('err'))}onValue(ROOT,snap=>{const val=snap.val();if(!val){state=defaultState();normalize();pushState()}else{state=val;normalize()}applyTheme();dot('ok');render()},()=>dot('err'));
function allTasks(sec){return[...(sec.tasks||[]),...(sec.groups||[]).flatMap(g=>g.tasks||[])]}function getTaskList(sid,gid){const s=state.sections.find(s=>s.id===sid);if(!s)return null;if(gid!=null){const g=(s.groups||[]).find(g=>g.id===gid);return g?g.tasks:null}return s.tasks}
function urgency(t){if(t.done)return{key:'done',label:'已完成'};if(!t.dueAt)return{key:'notime',label:'未排時間'};const diff=Math.round((new Date(t.dueAt)-new Date())/60000);if(diff<0)return{key:'overdue',label:`逾期 ${Math.abs(diff)} 分`};if(diff<=60)return{key:'urgent',label:`${diff} 分後到期`};if(diff<=180)return{key:'soon',label:`${Math.ceil(diff/60)} 小時內`};return{key:'normal',label:fmtDue(t.dueAt)}}function fmtDue(dt){const d=new Date(dt);return d.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false})}
function isVisible(t){const u=urgency(t).key;if(filter==='active'&&t.done)return false;if(filter==='done'&&!t.done)return false;if(filter==='overdue'&&u!=='overdue')return false;if(filter==='soon'&&!['urgent','soon'].includes(u))return false;if(filter==='notime'&&u!=='notime')return false;if(searchText){const blob=[t.text,t.note,...(t.assignees||[])].join(' ').toLowerCase();if(!blob.includes(searchText.toLowerCase()))return false}return true}
function sortTasks(list){return[...list].sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const ah=!!a.dueAt,bh=!!b.dueAt;if(ah&&!bh)return-1;if(!ah&&bh)return 1;if(ah&&bh)return new Date(a.dueAt)-new Date(b.dueAt);return(a.id||0)-(b.id||0)})}function purgeBin(){state.bin=(state.bin||[]).filter(b=>new Date(b.deletedAt).getTime()+7*86400000>Date.now())}
function personChip(n){const c=state.personColors?.[n]||'#bbb';return`<span class="chip" style="background:${c}33;color:${c};border:1px solid ${c}55">${esc(n)}</span>`}
function render(){if(!state)return;const tasks=state.sections.flatMap(s=>allTasks(s));const done=tasks.filter(t=>t.done).length;const warn=tasks.filter(t=>['overdue','urgent','soon'].includes(urgency(t).key)).length;document.getElementById('top-badge').textContent=`${done}/${tasks.length} 完成 · ${warn} 提醒`;document.getElementById('main-wrap').innerHTML=state.sections.map(renderSection).join('')+renderBinSection();renderPalette()}
function renderSection(sec){const all=allTasks(sec),d=all.filter(t=>t.done).length;return`<div class="section"><div class="sec-hd" onclick="toggleSec(${sec.id})"><svg class="cv ${sec.open?'open':''}" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="5,3 9,7 5,11"/></svg><span class="sec-title">${esc(sec.title)}</span><span class="count">${d}/${all.length}</span><button class="icon del" onclick="event.stopPropagation();trashSection(${sec.id})">×</button></div>${sec.open?`<div>${(sec.groups||[]).map(g=>renderGroup(g,sec.id)).join('')}<div>${sortTasks(sec.tasks||[]).filter(isVisible).map(t=>renderTask(t,sec.id,null)).join('')}</div>${renderAddGrpBtn(sec.id)}${renderAddRow(sec.id,null)}</div>`:''}</div>`}
function renderGroup(g,sid){const visible=sortTasks(g.tasks||[]).filter(isVisible),d=(g.tasks||[]).filter(t=>t.done).length;return`<div class="group"><div class="grp-hd" onclick="toggleGroup(${sid},${g.id})"><svg class="cv ${g.open?'open':''}" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><polyline points="5,3 9,7 5,11"/></svg><span class="grp-title">${esc(g.title)}</span><span class="count">${d}/${(g.tasks||[]).length}</span><button class="icon del" onclick="event.stopPropagation();trashGroup(${sid},${g.id})">×</button></div>${g.open?`<div>${visible.length?visible.map(t=>renderTask(t,sid,g.id)).join(''):'<div class="empty">尚無任務</div>'}${renderAddRow(sid,g.id)}</div>`:''}</div>`}
function renderTask(t,sid,gid){const u=urgency(t),ga=gid!=null?gid:'null',edit=editingId===t.id;const cls=t.done?'done':u.key==='overdue'?'overdue':['urgent','soon'].includes(u.key)?'urgent':u.key==='notime'?'notime':'';const chip=u.key==='overdue'?'overdue':u.key==='urgent'?'urgent':u.key==='soon'?'soon':u.key==='notime'?'none':u.key==='done'?'done':'time';return`<div class="todo ${cls} ${edit?'editing':''}"><button class="chk ${t.done?'yes':''}" onclick="toggleTask(${sid},${ga},${t.id})">${t.done?'<svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg>':''}</button><div class="normal"><div class="task-text">${esc(t.text)}</div><div class="meta">${(t.assignees||['所有人']).map(personChip).join('')}<span class="chip ${chip}">${u.label}</span></div>${t.note?`<div class="note">${esc(t.note)}</div>`:''}</div><div class="actions"><button class="icon" onclick="startEdit(${sid},${ga},${t.id})">✎</button><button class="icon del" onclick="trashTask(${sid},${ga},${t.id})">×</button></div>${edit?renderEditForm(t):''}</div>`}
function renderEditForm(t){const key=`edit_${t.id}`,label=editPickerSel.size?[...editPickerSel].join('、'):'負責人';return`<div class="edit-form"><input type="text" id="etxt-${t.id}" value="${esc(t.text)}" maxlength="80"/><input type="datetime-local" id="edue-${t.id}" value="${t.dueAt||''}"/>${renderWho(key,label)}<textarea id="enote-${t.id}" placeholder="備註（選填）">${esc(t.note||'')}</textarea><button class="btn save" onclick="saveEdit(${t.id})">儲存</button><button class="btn" onclick="cancelEdit()">取消</button></div>`}
function renderWho(key,label){const sel=key.startsWith('edit_')?editPickerSel:(pickerSel[key]=pickerSel[key]||new Set());return`<div class="who-wrap"><button class="who-btn" onclick="togglePicker('${key}',event)">${esc(label)}</button><div class="who-dropdown" id="wdrop-${key}" style="display:none">${(state.people||[]).map(p=>`<div class="who-option" onclick="togglePerson('${key}','${esc(p)}')"><span class="who-check ${sel.has(p)?'on':''}"></span><span style="color:${state.personColors[p]}">●</span>${esc(p)}</div>`).join('')}<div class="who-add"><input id="newp-${key}" placeholder="新增成員" onclick="event.stopPropagation()"/><button class="btn" onclick="addPerson('${key}');event.stopPropagation()">＋</button></div></div></div>`}
function renderAddRow(sid,gid){const key=gid!=null?`${sid}_${gid}`:`${sid}_ug`;if(!pickerSel[key])pickerSel[key]=new Set();const label=pickerSel[key].size?[...pickerSel[key]].join('、'):'負責人';return`<div class="add-row"><input type="text" id="inp-${key}" placeholder="新增任務..." maxlength="80" onkeydown="if(event.key==='Enter')addTask(${sid},${gid})"/><input type="datetime-local" id="date-${key}"/>${renderWho(key,label)}<button class="btn" onclick="addTask(${sid},${gid})">新增</button></div>`}
function renderAddGrpBtn(sid){return`<button class="add-grp-btn" onclick="showAddGrp(${sid})">＋ 新增子標題</button><div id="agf-${sid}" style="display:none" class="add-grp-row"><input id="agi-${sid}" placeholder="子標題名稱..."/><button class="btn" onclick="confirmAddGrp(${sid})">確認</button><button class="btn" onclick="hideAddGrp(${sid})">取消</button></div>`}
function renderBinSection(){const bin=state.bin||[];return`<div class="bin"><div class="bin-hd" onclick="toggleBin()"><span>🗑</span><span class="bin-title">垃圾桶 (${bin.length})</span><span class="count">7天後清除</span></div>${binOpen?`<div>${bin.length?bin.map(b=>`<div class="bin-item"><div class="bin-text">${esc(b.label||b.task?.text||b.group?.title||b.section?.title)}</div><button class="btn" onclick="restoreItem(${b.id})">還原</button><button class="icon del" onclick="permDel(${b.id})">×</button></div>`).join(''):'<div class="empty">垃圾桶是空的</div>'}</div>`:''}</div>`}
window.setSearch=v=>{searchText=v;render()};window.setFilter=(f,btn)=>{filter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render()};window.toggleSec=id=>{const s=state.sections.find(s=>s.id===id);if(s)s.open=!s.open;pushState()};window.toggleGroup=(sid,gid)=>{const g=state.sections.find(s=>s.id===sid)?.groups?.find(g=>g.id===gid);if(g)g.open=!g.open;pushState()};window.toggleBin=()=>{binOpen=!binOpen;render()};window.toggleTask=(sid,gid,tid)=>{const t=getTaskList(sid,gid)?.find(t=>t.id===tid);if(t)t.done=!t.done;pushState()};
window.addTask=(sid,gid)=>{const key=gid!=null?`${sid}_${gid}`:`${sid}_ug`,text=document.getElementById('inp-'+key)?.value.trim();if(!text)return;const dueAt=document.getElementById('date-'+key)?.value||'',sel=pickerSel[key]||new Set(),list=getTaskList(sid,gid);if(list)list.push({id:state.nid++,text,assignees:sel.size?[...sel]:['所有人'],done:false,dueAt,due:dateOnly(dueAt),note:''});pickerSel[key]=new Set();pushState()};
window.startEdit=(sid,gid,tid)=>{const t=getTaskList(sid,gid)?.find(t=>t.id===tid);editingId=tid;editPickerSel=new Set(t?.assignees||['所有人']);render();setTimeout(()=>document.getElementById('etxt-'+tid)?.focus(),0)};window.saveEdit=tid=>{let f=null;state.sections.forEach(s=>{[s.tasks,...(s.groups||[]).map(g=>g.tasks)].forEach(list=>{const t=(list||[]).find(t=>t.id===tid);if(t)f=t})});if(!f)return;f.text=document.getElementById('etxt-'+tid).value.trim()||f.text;f.dueAt=document.getElementById('edue-'+tid).value||'';f.due=dateOnly(f.dueAt);f.note=document.getElementById('enote-'+tid).value||'';f.assignees=editPickerSel.size?[...editPickerSel]:['所有人'];editingId=null;pushState()};window.cancelEdit=()=>{editingId=null;render()};
window.trashTask=(sid,gid,tid)=>{const s=state.sections.find(s=>s.id===sid),list=getTaskList(sid,gid),idx=list?.findIndex(t=>t.id===tid);if(idx==null||idx<0)return;const[task]=list.splice(idx,1),g=gid!=null?s.groups.find(g=>g.id===gid):null;state.bin.push({id:state.nid++,label:task.text,task,secId:sid,secTitle:s.title,gid:gid??null,groupTitle:g?.title??null,deletedAt:new Date().toISOString()});pushState()};window.trashGroup=(sid,gid)=>{const s=state.sections.find(s=>s.id===sid),idx=s?.groups?.findIndex(g=>g.id===gid);if(idx==null||idx<0)return;const[group]=s.groups.splice(idx,1);state.bin.push({id:state.nid++,label:group.title,isGroup:true,group,secId:sid,secTitle:s.title,deletedAt:new Date().toISOString()});pushState()};window.trashSection=sid=>{const idx=state.sections.findIndex(s=>s.id===sid);if(idx<0)return;const[section]=state.sections.splice(idx,1);state.bin.push({id:state.nid++,label:section.title,isSection:true,section,deletedAt:new Date().toISOString()});pushState()};
window.restoreItem=bid=>{const idx=state.bin.findIndex(b=>b.id===bid);if(idx<0)return;const[b]=state.bin.splice(idx,1);if(b.isSection)state.sections.push(b.section);else{const s=state.sections.find(s=>s.id===b.secId)||state.sections[0];if(b.isGroup){s.groups=s.groups||[];s.groups.push(b.group)}else{const list=getTaskList(s.id,b.gid);(list||s.tasks).push(b.task)}}pushState()};window.permDel=bid=>{state.bin=state.bin.filter(b=>b.id!==bid);pushState()};
window.showAddGrp=sid=>document.getElementById('agf-'+sid).style.display='flex';window.hideAddGrp=sid=>document.getElementById('agf-'+sid).style.display='none';window.confirmAddGrp=sid=>{const v=document.getElementById('agi-'+sid)?.value.trim();if(!v)return;const s=state.sections.find(s=>s.id===sid);s.groups=s.groups||[];s.groups.push({id:state.nid++,title:v,open:true,tasks:[]});pushState()};window.showNewSec=()=>{document.getElementById('new-sec-form').style.display='flex';document.getElementById('new-sec-input').focus()};window.cancelNewSec=()=>{document.getElementById('new-sec-form').style.display='none';document.getElementById('new-sec-input').value=''};window.confirmNewSec=()=>{const v=document.getElementById('new-sec-input').value.trim();if(!v)return;state.sections.push({id:state.nid++,title:v,open:true,groups:[],tasks:[]});window.cancelNewSec();pushState()};
window.togglePicker=(key,e)=>{e.stopPropagation();const d=document.getElementById('wdrop-'+key);if(!d)return;if(openPicker&&openPicker!==key){const o=document.getElementById('wdrop-'+openPicker);if(o)o.style.display='none'}const op=d.style.display!=='none';d.style.display=op?'none':'block';openPicker=op?null:key};window.togglePerson=(key,name)=>{const sel=key.startsWith('edit_')?editPickerSel:(pickerSel[key]=pickerSel[key]||new Set());if(sel.has(name))sel.delete(name);else sel.add(name);render();setTimeout(()=>{const d=document.getElementById('wdrop-'+key);if(d)d.style.display='block';openPicker=key},0)};window.addPerson=key=>{const inp=document.getElementById('newp-'+key),name=inp?.value.trim();if(!name)return;if(!state.people.includes(name)){state.people.push(name);state.personColors[name]=NAME_COLORS[state.people.length%NAME_COLORS.length]}const sel=key.startsWith('edit_')?editPickerSel:(pickerSel[key]=pickerSel[key]||new Set());sel.add(name);pushState()};document.addEventListener('click',()=>{if(openPicker){const d=document.getElementById('wdrop-'+openPicker);if(d)d.style.display='none';openPicker=null}});
</script>
</body>
</html>
